[platformio]
default_envs = uno

[env]
monitor_speed = 115200

[env:uno]
platform = atmelavr
board = uno
framework = arduino
lib_deps =
  paulstoffregen/OneWire@^2.3.8
  milesburton/DallasTemperature@^4.0.5
  marcoschwartz/LiquidCrystal_I2C@^1.1.4
  pololu/VL53L1X@^1.3.1
  arduino-libraries/Servo@^1.2.2
build_src_filter =
  +<uno/>
  -<esp32/>

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
  blynkkk/Blynk@^1.3.2
build_src_filter =
  +<esp32/>
  -<uno/>
